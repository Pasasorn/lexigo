<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Nunito',sans-serif}
body{background:#FFF8F0;min-height:100vh;padding:16px}

/* ── Header ── */
.header{background:linear-gradient(135deg,#FF6B35,#FF9800);border-radius:20px;padding:18px 20px;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:14px}
.logo{font-size:36px;line-height:1}
.header-text h1{font-size:20px;font-weight:900;margin-bottom:2px}
.header-text p{font-size:13px;font-weight:700;opacity:.9}
.header-badge{margin-left:auto;background:rgba(255,255,255,.25);border-radius:12px;padding:6px 12px;text-align:center;font-size:11px;font-weight:800}
.header-badge .num{font-size:22px;font-weight:900;display:block;line-height:1.1}

/* ── Stats row ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:14px;padding:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.stat-card .num{font-size:24px;font-weight:900;color:#FF6B35;display:block}
.stat-card .lbl{font-size:11px;font-weight:800;color:#78909C}

/* ── Section title ── */
.sec-title{font-size:14px;font-weight:900;color:#37474F;margin-bottom:10px;padding-left:2px}

/* ── Day grid ── */
.day-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.day-card{border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;text-decoration:none;display:block;transition:all .15s;position:relative;border:2px solid transparent}

/* completed */
.day-card.done{background:#E8F5E9;border-color:#A5D6A7}
.day-card.done .day-num{color:#2E7D32}
.day-card.done .day-ico{color:#43A047;font-size:20px}

/* current (next unlockable) */
.day-card.current{background:#E3F2FD;border-color:#90CAF9;animation:pulse .8s ease-in-out infinite alternate}
.day-card.current .day-num{color:#1565C0}
.day-card.current .day-ico{color:#1E88E5;font-size:22px}
@keyframes pulse{from{box-shadow:0 0 0 0 rgba(33,150,243,.3)}to{box-shadow:0 0 6px 4px rgba(33,150,243,.15)}}

/* review */
.day-card.review-done{background:#FFF8E1;border-color:#FFCC02}
.day-card.review-done .day-num{color:#E65100}
.day-card.review{background:#FFF3E0;border-color:#FFCC80}
.day-card.review .day-num{color:#BF360C}
.day-card.review .day-ico{font-size:20px}

/* locked sequential */
.day-card.locked{background:#F5F5F5;border-color:#E0E0E0;cursor:not-allowed;opacity:.7}
.day-card.locked .day-num{color:#9E9E9E}

/* out of range */
.day-card.out{background:#F5F5F5;border-color:#E0E0E0;cursor:not-allowed;opacity:.45}
.day-card.out .day-num{color:#BDBDBD}

.day-num{font-size:13px;font-weight:900;margin-bottom:2px}
.day-ico{font-size:18px;display:block;margin-bottom:2px}
.day-title{font-size:9px;font-weight:700;color:#78909C;line-height:1.3;display:none}

/* ── Pending screen ── */
.pending-box{background:#fff;border-radius:20px;padding:28px 20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px}
.pending-box .big-ico{font-size:56px;margin-bottom:14px}
.pending-box h2{font-size:18px;font-weight:900;color:#1E3A5F;margin-bottom:6px}
.pending-box p{font-size:13px;color:#546E7A;font-weight:700;line-height:1.6}
.poll-note{font-size:11px;color:#90A4AE;margin-top:10px}
#approvalNotif{margin-top:14px}

/* ── Bottom bar ── */
.bottom-bar{background:#fff;border-radius:16px;padding:14px 16px;display:flex;gap:10px;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}
.btn-progress{flex:1;background:linear-gradient(135deg,#5C6BC0,#3949AB);color:#fff;border:none;border-radius:12px;padding:11px;font-size:14px;font-weight:900;cursor:pointer;text-decoration:none;display:block;text-align:center;font-family:'Nunito',sans-serif}
.btn-logout{background:#FFF3E0;border:2px solid #FFE0B2;color:#E65100;border-radius:12px;padding:10px 14px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif}

/* ── Course badge ── */
.course-badge{background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.06)}

.course-badge .course-name{font-size:13px;font-weight:900;color:#37474F}
.course-badge .course-range{font-size:11px;color:#78909C;font-weight:700}

// ── Level → day range ──
function getLevelRange(levelNum, type) {
  if (type === 'lifetime' || !levelNum) return { startDay:1, endDay:448 };
  const s = (parseInt(levelNum) - 1) * 30 + 1;
  const e = parseInt(levelNum) === 15 ? 448 : parseInt(levelNum) * 30;
  return { startDay: s, endDay: e };
}

// ── CEFR color ──
const CEFR_COLOR = { A1:'#43A047', A2:'#1E88E5', B1:'#FB8C00', B2:'#E53935' };

// ── Streak ──
function calcStreak() {
  let streak = 0;
  for (let d = 448; d >= 1; d--) {
    if (localStorage.getItem('wla_d' + d)) streak++;
    else break;
  }
  return streak;
}

// ── JSONP ──
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = 'jpcb_' + Date.now();
    const s = document.createElement('script');
    const q = Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    window[cb] = d => { delete window[cb]; s.remove(); resolve(d); };
    s.onerror = () => { delete window[cb]; s.remove(); reject(new Error('JSONP error')); };
    s.src = API + '?' + q + '&callback=' + cb;
    document.body.appendChild(s);
  });
}

// ── Approval polling ──
let _pollTimer = null;
function startPoll(code) {
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(() => checkApproval(code), 30000);
}

async function checkApproval(code) {
  try {
    const res = await jsonp({ action:'checkApproval', code });
    if (res.status !== 'ok') return;
    const notif = document.getElementById('approvalNotif');

    if (res.approval_status === 'active') {
      clearInterval(_pollTimer);
      // Update localStorage: remove pending flag
      const stored = JSON.parse(localStorage.getItem(SK) || '{}');
      stored.pending_approval = false;
      localStorage.setItem(SK, JSON.stringify(stored));
      if (notif) {
        notif.innerHTML = `<div style="background:#D1FAE5;border:1.5px solid #6EE7B7;border-radius:11px;padding:12px 14px;font-size:13px;font-weight:800;color:#065F46;line-height:1.8">
          🎉 ครูอนุมัติแล้ว! รีโหลดเพื่อเริ่มเรียน<br>
          <button onclick="location.reload()" style="margin-top:8px;background:#059669;color:#fff;border:none;border-radius:10px;padding:9px 22px;font-size:14px;font-weight:900;cursor:pointer;font-family:'Nunito',sans-serif">
            🌟 เริ่มเรียนเลย!</button></div>`;
      }
    } else if (res.approval_status === 'rejected') {
      clearInterval(_pollTimer);
      localStorage.removeItem(SK);
      if (notif) {
        notif.innerHTML = `<div style="background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:11px;padding:12px 14px;font-size:13px;font-weight:800;color:#C62828;line-height:1.8">

            🔄 สมัครใหม่</button>
          <div style="margin-top:8px;font-size:11px">ติดต่อ Line: <strong>@LexiGo</strong></div></div>`;
      }
    }
  } catch(e) {}
}

// ── Build day grid ──
// ── Level helpers ──
function dayLevel(n){ return Math.min(15, Math.ceil(n / 30)); }
function levelRangeOf(L){ const s=(L-1)*30+1; const e=(L===15)?448:L*30; return {s,e}; }
function levelCefr(L){ return L<=3?'A1':L<=6?'A2':L<=10?'B1':'B2'; }
const LEVEL_EMOJI={A1:'🟢',A2:'🔵',B1:'🟡',B2:'🔴'};

function buildGrid(startDay, endDay, isAdmin) {
  const grid = document.getElementById('dayGrid');
  grid.innerHTML = '';

  // Filter to only days within range that have files
  const myDays = ALL_DAYS.filter(d => d.n >= startDay && d.n <= endDay);

  if (myDays.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:24px;color:#90A4AE;font-size:13px;font-weight:700">
      📦 บทเรียน Level นี้กำลังเตรียม…<br><span style="font-size:11px">ติดตามได้เร็วๆ นี้</span></div>`;
    return;
  }

  // Strict sequential: find the last consecutively-done day (skipped for admin)
  let frontier = startDay - 1;
  for (const d of myDays) {
    if (localStorage.getItem('wla_d' + d.n)) frontier = d.n;
    else break;
  }

  let doneCnt = 0;
  let curLevel = null;

  myDays.forEach((d) => {
    // Level header when crossing into a new level
    const L = dayLevel(d.n);
    if (L !== curLevel) {
      curLevel = L;
      const {s,e} = levelRangeOf(L);
      const cefr = levelCefr(L);
      const hdr = document.createElement('div');
      hdr.style.cssText = 'grid-column:1/-1;margin:14px 0 4px;padding:8px 14px;background:linear-gradient(135deg,#E8EAF6,#E3F2FD);border-radius:12px;font-weight:900;color:#283593;font-size:14px;display:flex;align-items:center;gap:8px';
      hdr.innerHTML = `${LEVEL_EMOJI[cefr]} Level ${L} · ${cefr} <span style="font-weight:700;color:#78909C;font-size:12px">(Day ${s}–${e})</span>`;
      grid.appendChild(hdr);
    }

    const isReview  = !!d.review;
    let isDone, isCurrent, unlocked;
    if (isAdmin) {
      // Admin sees everything, all clickable, marked as preview
      isDone = false; isCurrent = false; unlocked = true;
    } else {
      isDone    = d.n <= frontier && !!localStorage.getItem('wla_d' + d.n);
      isCurrent = d.n === frontier + 1;
      unlocked  = isDone || isCurrent;
      if (isDone) doneCnt++;
    }

    let cls = '', ico = '';
    if (isAdmin)                    { cls = 'done';           ico = isReview?'🌟':'👁️'; }
    else if (isDone && isReview)    { cls = 'review-done';    ico = '🌟'; }
    else if (isDone)                { cls = 'done';           ico = '✅'; }
    else if (isCurrent && isReview) { cls = 'review current'; ico = '⭐'; }
    else if (isCurrent)             { cls = 'current';        ico = '🎯'; }
    else if (isReview)              { cls = 'review locked';  ico = '🔒'; }
    else                            { cls = 'locked';         ico = '🔒'; }

    const card = document.createElement(unlocked ? 'a' : 'div');
    card.className = 'day-card ' + cls;
    if (unlocked) card.href = d.file;
    card.innerHTML = `
      <span class="day-ico">${ico}</span>
      <div class="day-num">Day ${d.n}</div>
      <div class="day-title">${d.title}</div>`;
    grid.appendChild(card);
  });

  // Stats
  const total = myDays.length;
  const pct   = total ? Math.round(doneCnt / total * 100) : 0;
  document.getElementById('statDone').textContent  = isAdmin ? '—' : doneCnt;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPct').textContent   = isAdmin ? 'ADMIN' : pct + '%';
}

function doLogout() {
  if (!confirm('ออกจากระบบ?')) return;
  localStorage.removeItem(SK);
  location.href = 'login.html';
}

function showDashboard(st) {

  const nick = st.nick || st.fullname || 'นักเรียน';
  document.getElementById('greetText').textContent = nick ? 'สวัสดี, น้อง' + nick + '! 👋' : 'สวัสดี! 👋';
  document.getElementById('streakNum').textContent = calcStreak();

  const isAdmin = localStorage.getItem('wla_admin') === '1';
  let { startDay, endDay } = getLevelRange(st.level, st.type);
  if (isAdmin) {
    // Admin sees every day that currently has a file
    startDay = 1;
    endDay   = Math.max(...ALL_DAYS.map(d => d.n));
  }
  const cefr = st.cefr || 'A1';
  document.getElementById('cefrDot').style.background   = CEFR_COLOR[cefr] || '#43A047';
  document.getElementById('courseName').textContent     = isAdmin ? '🔑 ADMIN — All Levels' : (st.course || 'Oxford 3000');
  document.getElementById('courseRange').textContent    = 'Day ' + startDay + '–' + Math.min(endDay, 448);
  document.getElementById('courseBadge').style.display  = 'flex';
  document.getElementById('courseText').textContent     = st.course || 'Oxford 3000';

  if (st.pending_approval) {
    document.getElementById('pendingBox').style.display  = 'block';
    document.getElementById('bottomBar').style.display   = 'flex';
    startPoll(st.code);
    return;
  }

  if (!isAdmin && startDay > 1 && !localStorage.getItem('wla_d' + (startDay - 1))) {
    localStorage.setItem('wla_d' + (startDay - 1), 'LEVEL-START');
  }
  document.getElementById('gridSection').style.display = 'block';
  document.getElementById('bottomBar').style.display   = 'flex';
  buildGrid(startDay, endDay, isAdmin);
}

// ── MAIN ──
const ADMIN_SECRET = 'Gift0142'; // 🔑 เปลี่ยนรหัสนี้เพื่อความปลอดภัย

function init() {
  // Admin via URL: dashboard.html?admin=SECRET  (ปิด: ?admin=off)
  const qp = new URLSearchParams(location.search);
  if (qp.has('admin')) {
    const v = qp.get('admin');
    if (v === ADMIN_SECRET) localStorage.setItem('wla_admin', '1');
    else if (v === 'off' || v === '0') localStorage.removeItem('wla_admin');
    // ล้าง param ออกจาก URL ไม่ให้รหัสค้างในแถบ address
    history.replaceState(null, '', location.pathname);
  }

  let st = JSON.parse(localStorage.getItem(SK) || 'null');
  // Admin can view without a student login
  if ((!st || !st.code) && localStorage.getItem('wla_admin') === '1') {
    st = { nick: 'Admin', code: 'ADMIN', type: 'lifetime', cefr: 'A1' };
  }
  if (!st || !st.code) {
    location.href = 'login.html';
    return;
  }
  showDashboard(st);
}

init();
</script>
